---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - delete
  - deletecollection
  - get
  - list
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
  - list
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - deletecollection
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - benchmark.apecloud.io
  resources:
  - esrallies
  - fios
  - pgbenches
  - redisbenches
  - sysbenches
  - tpccs
  - tpcds
  - tpches
  - ycsbs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - benchmark.apecloud.io
  resources:
  - esrallies/finalizers
  - fios/finalizers
  - pgbenches/finalizers
  - redisbenches/finalizers
  - sysbenches/finalizers
  - tpccs/finalizers
  - tpcds/finalizers
  - tpches/finalizers
  - ycsbs/finalizers
  verbs:
  - update
- apiGroups:
  - benchmark.apecloud.io
  resources:
  - esrallies/status
  - fios/status
  - pgbenches/status
  - redisbenches/status
  - sysbenches/status
  - tpccs/status
  - tpcds/status
  - tpches/status
  - ycsbs/status
  verbs:
  - get
  - patch
  - update
