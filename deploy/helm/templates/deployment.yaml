apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubebench.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubebench.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kubebench.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kubebench.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubebench.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          args:
          - --health-probe-bind-address=:8081
          - --metrics-bind-address=127.0.0.1:8080
          - --leader-elect
          env:
            - name: KUBEBENCH_PGBENCH_IMAGE
              value: "{{ .Values.kubebenchImages.pgbench.registry | default (.Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com") }}/{{ .Values.kubebenchImages.pgbench.repository }}:{{ .Values.kubebenchImages.pgbench.tag }}"
            - name: KUBEBENCH_SYSBENCH_IMAGE
              value: "{{ .Values.kubebenchImages.sysbench.registry | default (.Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com") }}/{{ .Values.kubebenchImages.sysbench.repository }}:{{ .Values.kubebenchImages.sysbench.tag }}"
            - name: KUBEBENCH_TPCC_IMAGE
              value: "{{ .Values.kubebenchImages.tpcc.registry | default (.Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com") }}/{{ .Values.kubebenchImages.tpcc.repository }}:{{ .Values.kubebenchImages.tpcc.tag }}"
            - name: KUBEBENCH_TPCDS_IMAGE
              value: "{{ .Values.kubebenchImages.tpcds.registry | default (.Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com") }}/{{ .Values.kubebenchImages.tpcds.repository }}:{{ .Values.kubebenchImages.tpcds.tag }}"
            - name: KUBEBENCH_TPCH_IMAGE
              value: "{{ .Values.kubebenchImages.tpch.registry | default (.Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com") }}/{{ .Values.kubebenchImages.tpch.repository }}:{{ .Values.kubebenchImages.tpch.tag }}"
            - name: KUBEBENCH_YCSB_IMAGE
              value: "{{ .Values.kubebenchImages.ycsb.registry | default (.Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com") }}/{{ .Values.kubebenchImages.ycsb.repository }}:{{ .Values.kubebenchImages.ycsb.tag }}"
            - name: KUBEBENCH_FIO_IMAGE
              value: "{{ .Values.kubebenchImages.fio.registry | default (.Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com") }}/{{ .Values.kubebenchImages.fio.repository }}:{{ .Values.kubebenchImages.fio.tag }}"
            - name: KUBEBENCH_REDISBENCH_IMAGE
              value: "{{ .Values.kubebenchImages.redisbench.registry | default (.Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com") }}/{{ .Values.kubebenchImages.redisbench.repository }}:{{ .Values.kubebenchImages.redisbench.tag }}"
            - name: KUBEBENCH_ESRALLY_IMAGE
              value: "{{ .Values.kubebenchImages.esrally.registry | default (.Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com") }}/{{ .Values.kubebenchImages.esrally.repository }}:{{ .Values.kubebenchImages.esrally.tag }}"
            - name: KUBEBENCH_EXPORTER_IMAGE
              value: "{{ .Values.kubebenchImages.exporter.registry | default (.Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com") }}/{{ .Values.kubebenchImages.exporter.repository }}:{{ .Values.kubebenchImages.exporter.tag | default .Chart.AppVersion }}"
            - name: KUBEBENCH_TOOLS_IMAGE
              value: "{{ .Values.kubebenchImages.tools.registry | default (.Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com") }}/{{ .Values.kubebenchImages.tools.repository }}:{{ .Values.kubebenchImages.tools.tag | default .Chart.AppVersion }}"
            {{- with .Values.tolerations }}
            - name: CM_TOLERATIONS
              value: {{ toJson . | quote }}
            {{- end }}
          command:
          - /manager
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.registry | default "apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com" }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
