# Default values for kubebench.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: apecloud/kubebench
  pullPolicy: IfNotPresent
  registry: apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8843

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

kubebenchImages:
  pgbench:
    registry: ""
    repository: apecloud/spilo
    tag: "14.8.0"
  sysbench:
    registry: ""
    repository: apecloud/customsuites
    tag: "latest"
  tpcc:
    registry: ""
    repository: apecloud/benchmarksql
    tag: "2.0"
  tpcds:
    registry: ""
    repository: apecloud/tpcds
    tag: "latest"
  tpch:
    registry: ""
    repository: apecloud/customsuites
    tag: "latest"
  ycsb:
    registry: ""
    repository: apecloud/go-ycsb
    tag: "latest"
  fio:
    registry: ""
    repository: apecloud/fio
    tag: "latest"
  redisbench:
    registry: ""
    repository: apecloud/redis
    tag: "7.0.5"
  esrally:
    registry: ""
    repository: apecloud/kubebench-esrally
    tag: "2.12.0"
  exporter:
    registry: ""
    repository: apecloud/kubebench
    tag: "0.0.14"
  tools:
    registry: ""
    repository: apecloud/kubebench
    tag: "0.0.14"
